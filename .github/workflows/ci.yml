name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint

    - name: Run Tests
      run: npm run test

    - name: Run Build
      run: npm run build
      env:
        MONGODB_URI: "mongodb://127.0.0.1:27017/blogapp-test"
        ADMIN_SESSION_SECRET: "test_secret_for_ci_builds_must_be_long_enough"
